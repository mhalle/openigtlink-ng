# Continuous integration: build + test the C++ codec and the
# Python codegen / corpus tools across the platforms we expect
# downstream consumers to run on — Linux (gcc + clang), macOS,
# and Windows / MSVC. Windows CI validates the Winsock backend
# of the transport's net_compat abstraction (see
# core-cpp/WINDOWS_PLAN.md).

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cpp:
    name: C++ ${{ matrix.os }} / ${{ matrix.cxx }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc-13
            cxx: g++-13
          - os: ubuntu-latest
            cc: clang-15
            cxx: clang++-15
          - os: macos-latest
            cc: clang
            cxx: clang++
          # Windows / MSVC 2022. The upstream-dependent tests
          # (compat_parity_*, compat_upstream_examples_interop)
          # self-gate on the upstream build artifact being present;
          # since we don't build upstream libOpenIGTLink on Windows,
          # those tests simply don't register. The rest of the
          # suite exercises the Winsock backend end-to-end.
          - os: windows-latest
            cc: ''
            cxx: ''

    steps:
      - uses: actions/checkout@v4

      # Clone upstream OpenIGTLink at the pinned oracle SHA. Tests,
      # codegen, and parity checks read upstream's test vectors from
      # this directory. The .gitignore excludes it from our repo
      # intentionally — see spec/corpus/ORACLE_VERSION.md.
      - name: Clone upstream OpenIGTLink (pinned oracle)
        run: |
          git clone --no-tags --depth 1 https://github.com/openigtlink/OpenIGTLink.git corpus-tools/reference-libs/openigtlink-upstream
          cd corpus-tools/reference-libs/openigtlink-upstream
          git fetch --depth 1 origin 94244fed7051e00cbcd4c341a7d7656be8ac404a
          git checkout 94244fed7051e00cbcd4c341a7d7656be8ac404a

      - name: Install GCC 13 (Ubuntu)
        if: runner.os == 'Linux' && startsWith(matrix.cxx, 'g++')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13

      - name: Install Clang 15 (Ubuntu)
        if: runner.os == 'Linux' && startsWith(matrix.cxx, 'clang++')
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-15

      # The oracle_parity ctest runs the Python oracle via
      # `uv run oigtl-corpus oracle verify`. It's marked SKIP
      # at runtime if `uv` is missing, but we want it to actually
      # exercise on every C++ matrix entry.
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync corpus-tools (so `uv run oigtl-corpus` works)
        working-directory: corpus-tools
        run: uv sync --all-extras

      # Pre-sync core-py so the cross_runtime_py ctest's
      # `uv run python python_tcp_echo.py` doesn't pay the sync
      # cost inline (and fails fast if core-py's deps are broken).
      # The test itself skips on Windows (POSIX-only fork/exec), so
      # only sync on non-Windows runners.
      - name: Sync core-py (for cross_runtime_py ctest)
        if: runner.os != 'Windows'
        working-directory: core-py
        run: uv sync --all-extras

      # POSIX: single-config Makefile/Ninja. Windows: we use the
      # Visual Studio 17 2022 multi-config generator explicitly so
      # MSBuild picks up MSVC 2022 without environment gymnastics.
      # --config Release propagates through build + ctest below.
      - name: Configure (POSIX)
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake -S core-cpp -B core-cpp/build

      - name: Configure (Windows / MSVC 2022)
        if: runner.os == 'Windows'
        run: cmake -S core-cpp -B core-cpp/build -G "Visual Studio 17 2022" -A x64

      - name: Build (POSIX)
        if: runner.os != 'Windows'
        run: cmake --build core-cpp/build --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build core-cpp/build --parallel --config Release

      - name: Test (POSIX)
        if: runner.os != 'Windows'
        working-directory: core-cpp/build
        run: ctest --output-on-failure

      - name: Test (Windows)
        if: runner.os == 'Windows'
        working-directory: core-cpp/build
        run: ctest --output-on-failure -C Release

  python:
    name: Python codegen + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone upstream OpenIGTLink (pinned oracle)
        run: |
          git clone --no-tags --depth 1 \
              https://github.com/openigtlink/OpenIGTLink.git \
              corpus-tools/reference-libs/openigtlink-upstream
          cd corpus-tools/reference-libs/openigtlink-upstream
          git fetch --depth 1 origin 94244fed7051e00cbcd4c341a7d7656be8ac404a
          git checkout 94244fed7051e00cbcd4c341a7d7656be8ac404a

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync corpus-tools with dev deps (pytest etc.)
        working-directory: corpus-tools
        run: uv sync --all-extras

      - name: Run pytest
        working-directory: corpus-tools
        run: uv run pytest

      - name: Verify generated C++ is in sync with schemas
        working-directory: corpus-tools
        run: uv run oigtl-corpus codegen cpp --check

      - name: Verify generated Python is in sync with schemas
        working-directory: corpus-tools
        run: uv run oigtl-corpus codegen python --check

      - name: Verify generated TypeScript is in sync with schemas
        working-directory: corpus-tools
        run: uv run oigtl-corpus codegen ts --check

      - name: Verify generated C is in sync with schemas
        working-directory: corpus-tools
        run: uv run oigtl-corpus codegen c --check

      - name: Verify upstream fixtures JSON is in sync
        working-directory: corpus-tools
        run: uv run oigtl-corpus fixtures export-json --check

      - name: Verify meta-schema is in sync with Pydantic models
        working-directory: corpus-tools
        run: uv run oigtl-corpus schema emit-meta --check

      # Build the C++ TCP-echo fixture so tests/test_cross_runtime_cpp.py
      # has a live core-cpp server to round-trip against. Without this,
      # the test self-skips and a cross-language wire-format regression
      # could slip through PR review. See also Option A: pack_header's
      # invariant rejects spec-inconsistent version=2 bodies at the
      # authoring site, but that's a local check; this interop hop is
      # what catches a *divergence* between cores at wire level.
      - name: Build core-cpp TCP-echo fixture for py↔cpp interop
        run: |
          cmake -B core-cpp/build -S core-cpp
          cmake --build core-cpp/build --target oigtl_cpp_tcp_echo --parallel

      - name: Run core-py tests
        working-directory: core-py
        run: uv run pytest --all-extras || uv run pytest

  # ---------------------------------------------------------------------------
  # fuzz-smoke: security/PLAN.md Phase 3-4.
  #
  # Two independent smokes run back-to-back on a single Linux+Clang job:
  #
  #   1. C++ libFuzzer targets — `fuzz_header` + `fuzz_oracle`,
  #      each for 60 s under ASan + UBSan. Catches memory-safety
  #      regressions (OOB read, integer overflow, UMR) in the
  #      hand-written runtime and the generated per-message codecs.
  #      A fuzzer-found body_size integer-overflow bug shipped via
  #      the negative corpus on 2026-04-17 — the regression is
  #      pinned there, but the live fuzzer keeps watching for new
  #      classes.
  #   2. Differential oracle fuzzer — 50k iterations across all four
  #      codecs (py-ref, py, cpp, ts). Any cross-language divergence
  #      is a wire-protocol conformance bug. The 1M-iteration clean
  #      baseline is documented in security/PLAN.md; the CI run is a
  #      smoke, not a full sweep.
  # ---------------------------------------------------------------------------
  fuzz-smoke:
    name: Fuzz smoke (libFuzzer + differential)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone upstream OpenIGTLink (pinned oracle)
        run: |
          git clone --no-tags --depth 1 \
              https://github.com/openigtlink/OpenIGTLink.git \
              corpus-tools/reference-libs/openigtlink-upstream
          cd corpus-tools/reference-libs/openigtlink-upstream
          git fetch --depth 1 origin 94244fed7051e00cbcd4c341a7d7656be8ac404a
          git checkout 94244fed7051e00cbcd4c341a7d7656be8ac404a

      - name: Install Clang 15 + libFuzzer
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-15

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync corpus-tools
        working-directory: corpus-tools
        run: uv sync --all-extras

      - name: Sync core-py (typed Python oracle)
        working-directory: core-py
        run: uv sync --all-extras

      - name: Build TS oracle CLI
        working-directory: core-ts
        run: |
          npm ci
          npx tsc -p tsconfig.json --outDir build-tests

      - name: Configure + build C++ oracle CLI (non-fuzz)
        env:
          CC: clang-15
          CXX: clang++-15
        run: |
          cmake -S core-cpp -B core-cpp/build
          cmake --build core-cpp/build --target oigtl_oracle_cli --parallel

      - name: Configure + build libFuzzer targets (ASan+UBSan)
        env:
          CC: clang-15
          CXX: clang++-15
        run: |
          cmake -S core-cpp -B core-cpp/build-fuzz \
                -DBUILD_FUZZERS=ON -DCMAKE_BUILD_TYPE=Debug
          cmake --build core-cpp/build-fuzz \
                --target fuzz_header fuzz_oracle fuzz_seed_corpus \
                --parallel

      - name: libFuzzer — fuzz_header (60 s)
        run: |
          core-cpp/build-fuzz/fuzz_header \
              core-cpp/build-fuzz/seeds/header \
              -max_total_time=60 -max_len=4096 \
              -artifact_prefix=./fuzz-artifact-header-

      - name: libFuzzer — fuzz_oracle (60 s)
        run: |
          core-cpp/build-fuzz/fuzz_oracle \
              core-cpp/build-fuzz/seeds/oracle \
              -max_total_time=60 -max_len=8192 \
              -artifact_prefix=./fuzz-artifact-oracle-

      # core-c fuzz targets. Separate build dir because we want the
      # C codec compiled under the same -fsanitize=fuzzer,address,
      # undefined flags, which don't cleanly mix with the C++ tree.
      - name: Configure + build core-c libFuzzer targets
        env:
          CC: clang-15
        run: |
          cmake -S core-c -B core-c/build-fuzz \
                -DOIGTL_C_BUILD_FUZZERS=ON -DCMAKE_BUILD_TYPE=Debug
          cmake --build core-c/build-fuzz \
                --target fuzz_transform fuzz_status \
                         fuzz_position fuzz_sensor fuzz_point \
                         fuzz_c_seed_corpus \
                --parallel

      - name: libFuzzer — core-c targets (30 s each)
        run: |
          for tgt in fuzz_transform fuzz_status fuzz_position fuzz_sensor fuzz_point; do
            echo "--- $tgt ---"
            core-c/build-fuzz/$tgt \
                core-c/build-fuzz/seeds/${tgt#fuzz_} \
                -max_total_time=30 -max_len=4096 \
                -artifact_prefix=./fuzz-artifact-c-${tgt}-
          done

      - name: Differential oracle fuzz (50 000 iterations)
        working-directory: corpus-tools
        run: |
          uv run oigtl-corpus fuzz differential -n 50000 \
              --oracle py-ref --oracle py \
              --oracle cpp --oracle ts \
              --progress-every 25000

      - name: Upload fuzz artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: |
            fuzz-artifact-*
            security/disagreements/*.jsonl
          if-no-files-found: ignore

  c:
    name: C codec ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      # Python is needed only for the parity emitter. It's preinstalled
      # on all three runners; `python` or `python3` depending on OS.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure (POSIX)
        if: runner.os != 'Windows'
        run: cmake -S core-c -B core-c/build -G 'Unix Makefiles'

      - name: Configure (Windows / MSVC)
        if: runner.os == 'Windows'
        run: cmake -S core-c -B core-c/build -G "Visual Studio 17 2022" -A x64

      - name: Build (POSIX)
        if: runner.os != 'Windows'
        run: cmake --build core-c/build --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build core-c/build --parallel --config Release

      - name: Test (POSIX)
        if: runner.os != 'Windows'
        working-directory: core-c/build
        run: ctest --output-on-failure

      - name: Test (Windows)
        if: runner.os == 'Windows'
        working-directory: core-c/build
        run: ctest --output-on-failure -C Release

  typescript:
    name: TypeScript ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Node 20 dropped: `node --test 'glob/**/*.test.js'` only
        # supports glob patterns from Node 22+. Node 20 hits EOL in
        # April 2026 regardless. If we want broader Node version
        # coverage, swap the test command to use a runner that
        # handles globs (vitest, mocha) or expand via find(1) in
        # the npm script.
        node: ['22']
    steps:
      - uses: actions/checkout@v4

      - name: Clone upstream OpenIGTLink (pinned oracle)
        run: |
          git clone --no-tags --depth 1 \
              https://github.com/openigtlink/OpenIGTLink.git \
              corpus-tools/reference-libs/openigtlink-upstream
          cd corpus-tools/reference-libs/openigtlink-upstream
          git fetch --depth 1 origin 94244fed7051e00cbcd4c341a7d7656be8ac404a
          git checkout 94244fed7051e00cbcd4c341a7d7656be8ac404a

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # The oracle_parity.test.ts shells out to `uv run oigtl-corpus`;
      # install uv so the parity suite actually runs instead of
      # self-skipping.
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync corpus-tools
        working-directory: corpus-tools
        run: uv sync --all-extras

      - name: Install TS deps
        working-directory: core-ts
        run: npm ci

      # Build the C++ TCP-echo fixture so
      # tests/net/cross_runtime_cpp.test.ts has a live core-cpp
      # server to round-trip against. Without this the TS test
      # self-skips and a ts↔cpp wire regression could slip through
      # review.
      - name: Build core-cpp TCP-echo fixture for ts↔cpp interop
        run: |
          cmake -B core-cpp/build -S core-cpp
          cmake --build core-cpp/build --target oigtl_cpp_tcp_echo --parallel

      - name: Typecheck
        working-directory: core-ts
        run: npm run typecheck

      - name: Test
        working-directory: core-ts
        run: npm test
